name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
          src: custom_components/smartpms
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
          src: custom_components/smartpms
